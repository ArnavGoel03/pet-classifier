name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (CPU-only, best-effort)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "optional deps failed; continuing"
      - name: Compile all Python modules
        run: python -m compileall -q .
